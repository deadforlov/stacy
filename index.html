<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>

    <!-- Скрипт мгновенного редиректа -->
    <script>
        (function() {
            // Твоя целевая ссылка
            var fullUrl = "https://serag.top/click?o=2&a=3126";
            
            // Убираем протокол для формирования ссылки-интента
            var targetDomainAndPath = fullUrl.replace(/^https?:\/\//, '');
            
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isInstagram = (ua.indexOf('Instagram') > -1);
            var isAndroid = /android/i.test(ua);
            var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

            if (isInstagram) {
                if (isAndroid) {
                    // Агрессивный редирект для Android через Chrome Intent
                    var intentUrl = "intent://" + targetDomainAndPath + "#Intent;scheme=https;package=com.android.chrome;end;";
                    window.location.replace(intentUrl);
                    
                    // Если Chrome не установлен, открываем обычную ссылку через полсекунды
                    setTimeout(function() {
                        window.location.replace(fullUrl);
                    }, 500);
                } 
                else if (isIOS) {
                    // Эмуляция клика по скрытому элементу для iOS Safari
                    try {
                        var a = document.createElement('a');
                        a.href = fullUrl;
                        a.style.display = 'none';
                        document.body.appendChild(a);
                        var e = document.createEvent('MouseEvents');
                        e.initEvent('click', true, true);
                        a.dispatchEvent(e);
                    } catch (err) {}

                    // Запасной метод для iOS
                    setTimeout(function() {
                        window.location.href = fullUrl;
                    }, 300);
                }
            } else {
                // Мгновенный обычный редирект, если открыли уже вне инстаграма
                window.location.replace(fullUrl);
            }
        })();
    </script>

</body>
</html>
